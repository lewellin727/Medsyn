baseline: ctgan
dataset: adult
split_name: seed0_n20

paths:
  train_csv: datasets/adult/splits/seed0_n20_train.csv
  result_csv: results/adult/ctgan_seed0_n20.csv
  model_path: baselines/ctgan/artifacts/adult_seed0_n20/ctgan.pt
  log_file: logs/adult/ctgan_seed0_n20.jsonl

schema:
  label_column: salary
  task_type: binclass
  n_classes: 2
  numerical_columns:
    - age
    - fnlwgt
    - education-num
    - capital-gain
    - capital-loss
    - hours-per-week
  categorical_columns:
    - marital-status
    - relationship
    - race
    - sex
    - country
    - employment_type
  discrete_columns:
    - marital-status
    - relationship
    - race
    - sex
    - country
    - employment_type
    - salary

ctgan:
  seed: 0
  device: cuda:0
  epochs: 10
  batch_size: 500
  embedding_dim: 128
  generator_dim:
    - 256
    - 256
  discriminator_dim:
    - 256
    - 256
  generator_lr: 0.0002
  generator_decay: 0.000001
  discriminator_lr: 0.0002
  discriminator_decay: 0.000001
  discriminator_steps: 1
  log_frequency: true
  pac: 10
  verbose: true
  sample:
    num_samples: 1000
