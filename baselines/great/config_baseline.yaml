baseline: great
dataset: adult
split_name: seed0_n20

paths:
  train_csv: datasets/adult/splits/seed0_n20_train.csv
  result_csv: results/adult/great_seed0_n20.csv
  model_dir: baselines/great/artifacts/adult_seed0_n20/model
  experiment_dir: baselines/great/artifacts/adult_seed0_n20/trainer
  log_file: logs/adult/great_seed0_n20.jsonl

schema:
  label_column: salary
  task_type: binclass
  n_classes: 2
  numerical_columns:
    - age
    - fnlwgt
    - education-num
    - capital-gain
    - capital-loss
    - hours-per-week
  categorical_columns:
    - marital-status
    - relationship
    - race
    - sex
    - country
    - employment_type

great:
  llm: distilgpt2
  seed: 0
  device: cuda:0
  epochs: 1000
  batch_size: 64
  save_steps: 400000
  max_length: 4000
  temperature: 0.7
  k: 100
  drop_nan: false
  guided_sampling: false
  random_feature_order: true
  float_precision: null
  sample:
    num_samples: 1000
