baseline: tabddpm
dataset: adult
split_name: seed0_n20

paths:
  train_csv: datasets/adult/splits/seed0_n20_train.csv
  val_csv: datasets/adult/splits/seed0_n20_oracle.csv
  test_csv: datasets/adult/splits/seed0_n20_test.csv
  tabddpm_root: baselines/tabddpm/tab-ddpm
  tabddpm_data_dir: baselines/tabddpm/tab-ddpm/data/medsyn_adult_seed0_n20
  tabddpm_exp_dir: baselines/tabddpm/tab-ddpm/exp/adult/medsyn_seed0_n20
  result_csv: results/adult/tabddpm_seed0_n20.csv

schema:
  label_column: salary
  task_type: binclass
  n_classes: 2
  numerical_columns:
    - age
    - fnlwgt
    - education-num
    - capital-gain
    - capital-loss
    - hours-per-week
  categorical_columns:
    - marital-status
    - relationship
    - race
    - sex
    - country
    - employment_type

tabddpm:
  device: cuda:0
  model_type: mlp
  seed: 0
  model_params:
    num_classes: 2
    is_y_cond: true
    rtdl_params:
      d_layers:
        - 256
        - 256
      dropout: 0.0
  diffusion_params:
    num_timesteps: 1000
    gaussian_loss_type: mse
    scheduler: cosine
  train:
    steps: 1000
    lr: 0.001
    weight_decay: 0.00001
    batch_size: 4096
  transform:
    seed: 0
    normalization: quantile
    num_nan_policy: __none__
    cat_nan_policy: __none__
    cat_min_frequency: __none__
    cat_encoding: __none__
    y_policy: default
  sample:
    num_samples: 1000
    batch_size: 1000
    seed: 0
  eval:
    eval_model: simple
    eval_type: synthetic
  eval_transform:
    seed: 0
    normalization: __none__
    num_nan_policy: __none__
    cat_nan_policy: __none__
    cat_min_frequency: __none__
    cat_encoding: __none__
    y_policy: default
