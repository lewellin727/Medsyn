baseline: smote
dataset: adult
split_name: seed0_n20

paths:
  train_csv: datasets/adult/splits/seed0_n20_train.csv
  result_csv: results/adult/smote_seed0_n20.csv
  log_file: logs/adult/smote_seed0_n20.jsonl

schema:
  label_column: salary
  task_type: binclass
  n_classes: 2
  numerical_columns:
    - age
    - fnlwgt
    - education-num
    - capital-gain
    - capital-loss
    - hours-per-week
  categorical_columns:
    - marital-status
    - relationship
    - race
    - sex
    - country
    - employment_type

smote:
  seed: 0
  k_neighbours: 5
  frac_samples: 1.0
  frac_lam_del: 0.65
  eval_type: synthetic
  sample:
    num_samples: 20
